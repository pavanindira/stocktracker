# alembic.ini
# Alembic configuration for StockTracker
# Run: alembic upgrade head
# Generate new migration: alembic revision --autogenerate -m "description"

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path is prepended with this value during `alembic` commands
prepend_sys_path = .

# Timezone for %%(year)d etc; defaults to UTC
# timezone =

# Truncate length of slug in migration filename
truncate_slug_length = 40

# Set to 'true' to run the environment during migrations
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without source .py files
# sourceless = false

# Version path separator; valid options are: colon, semicolon, space or newline
version_path_separator = os

# The output encoding used when revision files are written
# output_encoding = utf-8

# DATABASE_URL is read from the environment (set in .env)
# This is overridden in env.py to use python-dotenv
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Uncomment to auto-format with black after generating migrations:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
