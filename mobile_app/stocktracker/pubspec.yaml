version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  mobile_scanner: ^5.1.0
  provider: ^6.1.2
  intl: ^0.19.0
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.3.1
  file_picker: ^8.0.3
  cupertino_icons: ^1.0.6
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
