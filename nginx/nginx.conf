# nginx/nginx.conf
# Reverse proxy for StockTracker FastAPI app.
# Serves static files directly (no Python overhead).
# For HTTPS: replace the server block with an SSL block and point to
# /etc/letsencrypt/live/<domain>/ certs (e.g. via Certbot).

upstream stocktracker_app {
    server app:8000;
    keepalive 32;
}

# Redirect HTTP → HTTPS in production
# Uncomment when TLS is configured:
# server {
#     listen 80;
#     server_name yourdomain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;          # catch-all; replace with your domain in production

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(self)" always;

    # ── Static files (served by Nginx — bypasses Python entirely) ─────────────
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Favicon ───────────────────────────────────────────────────────────────
    location = /favicon.ico {
        alias /app/static/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # ── Proxy everything else to Uvicorn ──────────────────────────────────────
    location / {
        proxy_pass         http://stocktracker_app;
        proxy_http_version 1.1;

        # Required for starlette SessionMiddleware
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Upload limit (CSV import, label PDFs)
        client_max_body_size 20M;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Health check (used by Docker HEALTHCHECK + load balancers) ────────────
    location = /health {
        proxy_pass http://stocktracker_app/health;
        access_log off;
    }

    # ── HTTPS block (uncomment + fill in domain when TLS is ready) ───────────
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
}
